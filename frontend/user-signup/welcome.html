<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velkommen</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="welcome-page">
    <main class="welcome-shell">
        <section class="welcome-content" aria-labelledby="welcome-title">
            <img class="welcome-logo" src="sde-logotype.png" alt="Syddansk Erhvervsskole">
            <p class="welcome-kicker">Kontoen er oprettet</p>
            <h1 id="welcome-title">Velkommen til SOP IT Service</h1>
            <p class="welcome-text">
                Din skolekonto er nu bekræftet, og du kan logge ind med din SDE-mail og adgangskode.
            </p>
            <!-- <a class="welcome-action" href="http://support.localhost/">Gå til login</a> -->
        </section>

        <aside class="welcome-status" aria-label="Status">
            <div class="status-mark" aria-hidden="true">✓</div>
            <p>Bekræftet</p>
            <span>Klar til brug</span>
        </aside>
    </main>
</body>
</html>
